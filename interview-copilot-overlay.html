    // ─────────────────────────────────────────────────────────────────────
    // TRANSCRIPT MANAGEMENT
    // ─────────────────────────────────────────────────────────────────────
    function addTranscriptEntry(entry) {
      const entriesContainer = document.getElementById('entries');
      const empty = document.getElementById('transcriptEmpty');
      if (!entriesContainer) return;

      if (transcriptEntries.length > 0 && transcriptEntries[transcriptEntries.length - 1].text === entry.text) return;

      if (entriesContainer.style.display === 'none') {
        entriesContainer.style.display = 'flex';
        if (empty) empty.style.display = 'none';
      }

      const el = document.createElement('div');
      el.className = 'entry ' + entry.type;
      el.innerHTML = `
        <div class="entry-time">${new Date().toLocaleTimeString()}</div>
        <div class="entry-content">
          <div class="entry-speaker">${escHtml(entry.speaker)}</div>
          <div class="entry-text">${escHtml(entry.text)}</div>
        </div>`;
      entriesContainer.appendChild(el);
      entriesContainer.scrollTop = entriesContainer.scrollHeight;
      // Stamp receive-time so updateLiveTranscript shows accurate timestamps
      const entryObj = { ...entry, time: getNow() };
      transcriptEntries.push(entryObj);

      // Make interviewer entries editable — click to edit, Enter to re-answer
      if (entry.type === 'interviewer') {
        const textEl = el.querySelector('.entry-text');
        textEl.style.cursor = 'text';
        textEl.title = 'Click to edit, Enter to re-answer';

        textEl.addEventListener('click', function () {
          if (editingEntryEl && editingEntryEl !== this) {
            editingEntryEl.contentEditable = 'false';
          }
          this.contentEditable = 'plaintext-only';
          this.focus();
          editingEntryEl = this;
          const range = document.createRange();
          range.selectNodeContents(this);
          const sel = window.getSelection();
          sel.removeAllRanges();
          sel.addRange(range);
        });

        textEl.addEventListener('keydown', function (e) {
          if (e.key === 'Enter') {
            e.preventDefault();
            this.contentEditable = 'false';
            editingEntryEl = null;
            const corrected = this.textContent.trim();
            if (!corrected) return;

            entryObj.text = corrected;
            updateLiveTranscript();

            // Remove the last AI response (answered the misheard version)
            for (let i = transcriptEntries.length - 1; i >= 0; i--) {
              if (transcriptEntries[i].type === 'ai-response') {
                transcriptEntries.splice(i, 1);
                break;
              }
            }
            const aiEntries = entriesContainer.querySelectorAll('.entry.ai-response');
            if (aiEntries.length > 0) aiEntries[aiEntries.length - 1].remove();

            if (isInterviewPrompt(corrected)) {
              queryAI(corrected);
            }
          }
        });
      }

      // Keep max 8 entries — remove oldest
      const MAX_ENTRIES = 8;
      while (transcriptEntries.length > MAX_ENTRIES) {
        transcriptEntries.shift();
        if (entriesContainer.firstChild) entriesContainer.firstChild.remove();
      }
    }

    function clearTranscript() {
      if (!confirm('Clear all transcript entries?')) return;
      const c = document.getElementById('entries');
      if (c) { c.innerHTML = ''; c.style.display = 'none'; }
      const e = document.getElementById('transcriptEmpty');
      if (e) e.style.display = 'block';
      document.getElementById('interim-text').textContent = '';
      document.getElementById('liveEntries').innerHTML = '';
      document.getElementById('liveInterim').textContent = '';
      transcriptEntries = [];
      showToast('Transcript cleared');
    }

    function downloadTranscript() {
      if (transcriptEntries.length === 0) { showToast('No entries'); return; }
      const lines = transcriptEntries.map(e =>
        `[${e.time || new Date().toLocaleTimeString()}] ${e.speaker}: ${e.text}`
      ).join('\n\n');
      const blob = new Blob([lines], { type: 'text/plain' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'interview-' + new Date().toISOString().split('T')[0] + '.txt';
      a.click();
      URL.revokeObjectURL(url);
      showToast('Transcript downloaded');
    }

    // ─────────────────────────────────────────────────────────────────────
    // KEYBOARD SHORTCUTS
    // ─────────────────────────────────────────────────────────────────────
    document.addEventListener('keydown', async (e) => {
      const ctrl = e.ctrlKey || e.metaKey;

      // Ctrl+Q/J/K/Y → toggle panels; Ctrl+M → paste+AI
      if (ctrl) {
        switch (e.key) {
          case 'q': e.preventDefault(); togglePanel('model'); return;
          case 'j': e.preventDefault(); togglePanel('code'); return;
          case 'k': e.preventDefault(); togglePanel('context'); return;
          case 'm': e.preventDefault(); await pasteFromClipboardAndQuery('nvidia'); return;
        }
      }

      // Escape → close panel
      if (e.key === 'Escape' && activePanel) {
        e.preventDefault();
        closePanel();
        return;
      }

      // Alt+R → toggle recording
      if (e.altKey && e.key === 'r' && !isEditableElement(e.target)) {
        e.preventDefault();
        openPanel('wave');
        if (isListening) { stopListening(); }
        else { startListening(); }
      }
    });

    // Alt+Z toggle mute (works globally via globalShortcut in main process)
    function toggleMute() {
      isMuted = !isMuted;
      if (isMuted) {
        document.getElementById('mute-badge').style.display = 'block';
        if (!micStream) return;
        recognitionMuted = true;
        if (recognition) recognition.abort();
        micStream.getAudioTracks().forEach(t => t.enabled = false);
      } else {
        document.getElementById('mute-badge').style.display = 'none';
        if (!micStream) return;
        micStream.getAudioTracks().forEach(t => t.enabled = true);
        recognitionMuted = false;
        if (isListening && recognition) {
          try { recognition.start(); } catch {}
        }
      }
    }
    document.addEventListener('keydown', (e) => {
      if (e.altKey && e.key === 'z' && !e.repeat) {
        e.preventDefault();
        toggleMute();
      }
    });

    // ─────────────────────────────────────────────────────────────────────
    // BUTTONS
    // ─────────────────────────────────────────────────────────────────────
    document.getElementById('btnClearResponse').addEventListener('click', async () => {
      if (window.electronAPI?.quitApp) {
        await window.electronAPI.quitApp(); // cleanup runs in main before window closes
      } else {
        window.close(); // fallback for non-Electron environments
      }
    });

    // ─────────────────────────────────────────────────────────────────────
    // INIT
    // ─────────────────────────────────────────────────────────────────────
    function init() {
      const saved = localStorage.getItem('copilot_model');
      if (saved && MODELS[saved]) currentModel = saved;

      renderModelGrid();

      const keyInput = document.getElementById('apiKeyInput');
      if (keyInput) keyInput.value = apiKeys[currentModel] || '';
      updateApiStatus();

      // Init context panel
      renderCtxDropdown();
      if (activeCtxId) loadCtxText(activeCtxId);
      document.getElementById('ctxToggle').checked = includeCtx;

      // Load relay config from .env via preload, then auto-connect relay
      if (window.electronAPI?.getRelayConfig) {
        window.electronAPI.getRelayConfig().then(cfg => {
          relayConfig = cfg;
          console.log('[Init] Relay config loaded — url:', cfg.url || '(EMPTY — check .env RELAY_URL)', 'secret:', cfg.secret ? '***set***' : '(EMPTY)');
          connectRelay(); // auto-connect relay on startup — don't wait for Record button
        });
      } else {
        console.warn('[Init] electronAPI.getRelayConfig not available — not running in Electron?');
      }

      // Sync relay-paused state from main on startup — so if the app was muted
      // before the renderer loaded (or the page reloaded while muted) the
      // relayPaused flag is correct before the first message arrives.
      if (window.electronAPI?.getRelayPaused) {
        window.electronAPI.getRelayPaused().then(({ paused }) => {
          relayPaused = paused;
          if (paused) console.log('[Relay] Started in paused state (muted at launch)');
        }).catch(() => {}); // non-fatal if preload not yet updated
      }

      // Listen for mute state changes from main process
      if (window.electronAPI?.onMicMuteChanged) {
        window.electronAPI.onMicMuteChanged((muted) => {
          document.getElementById('mute-badge').style.display = muted ? 'block' : 'none';
        });
      }

      // Global Alt+Z toggle mute from main process (works when overlay is unfocused)
      // Use the authoritative muted state from main rather than always toggling,
      // so rapid Alt+Z presses can't desync main and renderer.
      if (window.electronAPI?.onPushToMute) {
        window.electronAPI.onPushToMute((muted) => {
          if (isMuted !== muted) toggleMute();
        });
      }

      // relay-pause / relay-resume are sent by main whenever Alt+Z fires.
      // They set relayPaused so the relay WebSocket onmessage handler drops
      // transcripts even if the renderer-local isMuted flag gets out of sync.
      if (window.electronAPI?.onRelayPause) {
        window.electronAPI.onRelayPause(() => {
          relayPaused = true;
          console.log('[Relay] Paused by main process — transcripts will be dropped');
        });
      }
      if (window.electronAPI?.onRelayResume) {
        window.electronAPI.onRelayResume(() => {
          relayPaused = false;
          console.log('[Relay] Resumed by main process');
        });
      }

      // Global Ctrl+M shortcut from main process (works when overlay is unfocused)
      if (window.electronAPI?.onGlobalCtrlM) {
        window.electronAPI.onGlobalCtrlM(async () => {
          await pasteFromClipboardAndQuery('nvidia');
        });
      }

      setStatus('ready');
    }

    init();
  </script>
</body>
</html>
