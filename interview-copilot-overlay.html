<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Interview Copilot — Floating Overlay</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: transparent;
      color: #f0f0f0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .floating-container {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(10, 10, 14, 0.38);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.8);
      z-index: 10000;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .titlebar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 16px;
      background: rgba(20, 20, 26, 0.8);
      border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      cursor: grab;
      user-select: none;
      flex-shrink: 0;
      height: 44px;
      position: relative;
      z-index: 110;
      -webkit-app-region: drag;
    }
    .titlebar:active { cursor: grabbing; }

    .titlebar-title {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: -0.01em;
      flex: 1;
      color: #f0f0f0;
    }

    .status-indicator {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #606068;
      transition: background 0.3s;
    }
    .status-indicator.listening { background: #10b981; animation: pulse 2s infinite; }
    .status-indicator.thinking { background: #f59e0b; animation: pulse 2s infinite; }
    .status-indicator.responding { background: #3b82f6; animation: pulse 2s infinite; }
    .status-indicator.error { background: #ef4444; }
    .status-indicator.ready { background: #10b981; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .controls {
      display: flex;
      gap: 4px;
      align-items: center;
      -webkit-app-region: no-drag;
    }

    .btn-ctrl {
      padding: 5px 10px;
      background: transparent;
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 5px;
      color: #a0a0a8;
      cursor: pointer;
      font-size: 11px;
      font-weight: 500;
      transition: all 0.15s;
      white-space: nowrap;
      font-family: inherit;
      -webkit-app-region: no-drag;
    }
    .btn-ctrl:hover { background: rgba(255, 255, 255, 0.08); color: #f0f0f0; border-color: rgba(255, 255, 255, 0.15); }
    .btn-ctrl:active { transform: scale(0.95); }
    .btn-ctrl.danger { color: #ef4444; border-color: rgba(239, 68, 68, 0.2); }
    .btn-ctrl.danger:hover { background: rgba(239, 68, 68, 0.1); border-color: rgba(239, 68, 68, 0.3); }
    .btn-ctrl.primary { background: rgba(99, 102, 241, 0.2); color: #6366f1; border-color: rgba(99, 102, 241, 0.3); }
    .btn-ctrl.primary:hover { background: rgba(99, 102, 241, 0.3); border-color: rgba(99, 102, 241, 0.5); }

    .transcript-bar {
      padding: 8px 16px;
      background: rgba(26, 26, 34, 0.6);
      border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      font-size: 12px;
      color: #a0a0a8;
      max-height: 48px;
      overflow-y: auto;
      flex-shrink: 0;
      line-height: 1.5;
      position: relative;
      z-index: 110;
    }
    .transcript-bar::-webkit-scrollbar { width: 3px; }
    .transcript-bar::-webkit-scrollbar-thumb { background: rgba(255, 255, 255, 0.1); border-radius: 2px; }

    .ai-response-display {
      flex: 1;
      padding: 20px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      text-align: center;
      position: relative;
      z-index: 100;
    }
    .ai-response-display::-webkit-scrollbar { width: 4px; }
    .ai-response-display::-webkit-scrollbar-thumb { background: rgba(99, 102, 241, 0.3); border-radius: 4px; }

    .response-text {
      font-size: 22px;
      line-height: 1.7;
      color: #e8e8ff;
      max-width: 100%;
      word-wrap: break-word;
      animation: fadeIn 0.3s ease-in;
      text-shadow: 0 0 20px rgba(99, 102, 241, 0.15);
    }

    .response-speaker {
      font-size: 13px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #76b900;
      margin-bottom: 14px;
      font-weight: 700;
      text-shadow: 0 0 12px rgba(118, 185, 0, 0.25);
    }

    .empty-state { color: #606068; font-size: 14px; text-align: center; }

    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

    .floating-container.minimized .ai-response-display { display: none; }
    .floating-container.minimized .transcript-bar { max-height: none; }

    /* Keyboard hint */
    /* Resize handle */
    .resize-handle {
      position: absolute;
      bottom: 0;
      right: 0;
      width: 20px;
      height: 20px;
      cursor: nwse-resize;
      z-index: 9999;
    }
    .resize-handle::after {
      content: '';
      position: absolute;
      bottom: 5px;
      right: 5px;
      width: 10px;
      height: 10px;
      border-right: 2px solid rgba(255,255,255,0.25);
      border-bottom: 2px solid rgba(255,255,255,0.25);
    }

    /* Live transcript */
    .live-transcript {
      flex: 1;
      overflow-y: auto;
      border-top: 1px solid rgba(255,255,255,0.06);
      display: flex;
      flex-direction: column;
    }
    .live-transcript.active {
      overflow-y: auto;
    }
    .live-transcript::-webkit-scrollbar { width: 3px; }
    .live-transcript::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }
    
    #liveEntries {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 16px;
      overflow-y: auto;
    }
    
    .live-entry {
      display: flex;
      gap: 10px;
      padding: 12px 14px;
      font-size: 16px;
      line-height: 1.6;
      color: #e0e0e0;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      background: rgba(26, 26, 34, 0.3);
      border-radius: 6px;
      align-items: flex-start;
    }
    .live-entry .t { font-size: 11px; color: #606068; flex-shrink: 0; min-width: 50px; padding-top: 4px; font-family: 'JetBrains Mono', monospace; }
    .live-entry .s { font-weight: 700; flex-shrink: 0; font-size: 12px; }
    .live-entry .s.i { color: #76b900; }
    .live-entry .s.a { color: #76b900; }
    .live-entry .x { flex: 1; word-break: break-word; font-size: 16px; }
    .live-interim { padding: 3px 12px 6px; font-size: 12px; color: #606068; font-style: italic; min-height: 18px; }

    /* ── Panel Overlay ── */
    .panel-overlay {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 200;
      background: rgba(10, 10, 14, 0.38);
      backdrop-filter: blur(10px);
      flex-direction: column;
      padding: 16px;
      border-radius: 12px;
      animation: slideIn 0.15s ease-out;
      overflow-y: auto;
    }
    .panel-overlay.open { display: flex; }
    .panel-overlay::-webkit-scrollbar { width: 4px; }
    .panel-overlay::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 4px; }

    @keyframes slideIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
      font-size: 13px;
      font-weight: 600;
      color: #f0f0f0;
      -webkit-app-region: drag;
    }
    .panel-hint {
      font-size: 10px;
      color: #606068;
      font-weight: 400;
      background: rgba(255,255,255,0.05);
      padding: 2px 8px;
      border-radius: 4px;
    }
    .panel-close {
      background: none;
      border: none;
      color: #606068;
      cursor: pointer;
      font-size: 16px;
      padding: 2px 6px;
      -webkit-app-region: no-drag;
    }
    .panel-close:hover { color: #f0f0f0; }

    /* ── Model Grid ── */
    .model-grid {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
      -webkit-app-region: no-drag;
    }
    .model-option {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: rgba(26, 26, 34, 0.8);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.15s;
      -webkit-app-region: no-drag;
    }
    .model-option:hover { background: rgba(36, 36, 48, 0.8); }
    .model-option input[type="radio"] { cursor: pointer; accent-color: #6366f1; -webkit-app-region: no-drag; }
    .model-option label { flex: 1; cursor: pointer; -webkit-app-region: no-drag; }
    .model-name { font-size: 13px; font-weight: 500; color: #f0f0f0; }
    .model-desc { font-size: 11px; color: #606068; margin-top: 1px; }
    .model-option .check { color: #10b981; font-size: 13px; }

    /* ── API Key Input ── */
    .api-section { margin-top: 8px; }
    .api-label { font-size: 10px; color: #606068; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; font-weight: 600; }
    .api-input-wrap {
      position: relative;
      display: flex;
      align-items: center;
    }
    .api-input {
      width: 100%;
      padding: 7px 32px 7px 10px;
      background: rgba(26, 26, 34, 0.8);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      color: #f0f0f0;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      outline: none;
      -webkit-app-region: no-drag;
    }
    .api-input:focus { border-color: rgba(99, 102, 241, 0.5); }
    .api-eye {
      position: absolute;
      right: 8px;
      background: none;
      border: none;
      color: #606068;
      cursor: pointer;
      padding: 2px;
      display: flex;
      -webkit-app-region: no-drag;
    }
    .api-eye:hover { color: #a0a0a8; }
    #apiStatus { font-size: 10px; color: #606068; margin-top: 4px; min-height: 14px; }

    /* ── Code Chatbox ── */
    .code-textarea {
      width: 100%;
      min-height: 100px;
      padding: 8px 10px;
      background: rgba(26, 26, 34, 0.8);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 6px;
      color: #f0f0f0;
      font-size: 12px;
      font-family: 'JetBrains Mono', monospace;
      resize: vertical;
      outline: none;
      line-height: 1.5;
      margin-bottom: 8px;
      -webkit-app-region: no-drag;
    }
    .code-textarea:focus { border-color: rgba(99, 102, 241, 0.5); }
    .code-textarea::placeholder { color: #606068; }

    /* ── Panel: Context ── */
    .ctx-select { width:100%;padding:6px 8px;margin-bottom:8px;background:#222;color:#eee;border:1px solid #333;border-radius:6px;font-size:13px;-webkit-app-region:no-drag; }
    .ctx-textarea { width:100%;min-height:140px;padding:8px;background:#1a1a1e;color:#eee;border:1px solid #333;border-radius:6px;font-size:13px;resize:vertical;outline:none;font-family:inherit;box-sizing:border-box;-webkit-app-region:no-drag;pointer-events:auto !important; }
    .ctx-textarea:focus { border-color: rgba(99,102,241,0.5); }
    .ctx-textarea::placeholder { color:#606068; }
    .ctx-label { display:flex;align-items:center;gap:6px;margin:8px 0;font-size:12px;color:#aaa;cursor:pointer;-webkit-app-region:no-drag; }
    .ctx-label input { accent-color:#6366f1;-webkit-app-region:no-drag; }
    .ctx-actions { display:flex;gap:6px; }
    .ctx-btn { flex:1;padding:6px;border:none;border-radius:6px;font-size:12px;cursor:pointer;background:#2a2a2e;color:#ccc;-webkit-app-region:no-drag; }
    .ctx-btn:hover { background:#333; }
    .ctx-btn.primary { background:#6366f1;color:#fff; }
    .ctx-btn.primary:hover { background:#5558e6; }
    .ctx-btn.danger { background:#4a1a1a;color:#f88; }
    .ctx-btn.danger:hover { background:#5a2020; }

    .code-actions {
      display: flex;
      gap: 6px;
    }
    .code-btn {
      flex: 1;
      padding: 7px 10px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent;
      color: #a0a0a8;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      font-family: inherit;
    }
    .code-btn:hover { background: rgba(255,255,255,0.06); color: #f0f0f0; }
    .code-btn.primary { background: rgba(118,185,0,0.15); border-color: rgba(118,185,0,0.4); color: #76b900; }
    .code-btn.primary:hover { background: rgba(118,185,0,0.25); }

    /* ── Waveform ── */
    .waveform { height: 40px; display: flex; align-items: center; gap: 3px; padding: 6px 0; justify-content: center; }
    .waveform-bar { width: 3px; border-radius: 3px; background: #6366f1; opacity: 0.4; height: 28px; transform: scaleY(0.15); transform-origin: bottom; transition: opacity 0.1s; }
    .waveform-bar.active { opacity: 0.9; animation: wave 0.5s ease-in-out infinite alternate; }
    @keyframes wave { from { transform: scaleY(0.15); } to { transform: scaleY(1); } }
    .waveform-bar.active:nth-child(2) { animation-delay: 0.08s; }
    .waveform-bar.active:nth-child(3) { animation-delay: 0.16s; }
    .waveform-bar.active:nth-child(4) { animation-delay: 0.24s; }
    .waveform-bar.active:nth-child(5) { animation-delay: 0.1s; }
    .waveform-bar.active:nth-child(6) { animation-delay: 0.18s; }
    .waveform-bar.active:nth-child(7) { animation-delay: 0.05s; }
    .waveform-label { font-size: 11px; color: #606068; text-align: center; margin-top: 4px; }

    .record-btns {
      display: flex;
      gap: 8px;
      justify-content: center;
      margin-top: 8px;
    }
    .btn-rec {
      padding: 8px 20px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.1);
      background: transparent;
      color: #a0a0a8;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .btn-rec:hover { background: rgba(255,255,255,0.06); color: #f0f0f0; }
    .btn-rec:disabled { opacity: 0.4; cursor: not-allowed; }
    .btn-rec.record { background: rgba(16,185,129,0.15); border-color: rgba(16,185,129,0.4); color: #10b981; }
    .btn-rec.record:hover { background: rgba(16,185,129,0.25); }
    .btn-rec.stop { background: rgba(239,68,68,0.15); border-color: rgba(239,68,68,0.4); color: #ef4444; }
    .btn-rec.stop:hover { background: rgba(239,68,68,0.25); }

    /* ── Full Transcript ── */
    #entries {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      overflow-y: auto;
    }
    #entries::-webkit-scrollbar { width: 3px; }
    #entries::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

    .entry {
      display: flex;
      gap: 10px;
      padding: 12px 16px;
      border-radius: 8px;
      background: rgba(26, 26, 34, 0.4);
      border: 1px solid rgba(255,255,255,0.06);
    }
    .entry-time {
      font-size: 10px;
      color: #606068;
      font-family: 'JetBrains Mono', monospace;
      padding-top: 2px;
      flex-shrink: 0;
      min-width: 36px;
    }
    .entry-content { flex: 1; display: flex; flex-direction: column; gap: 2px; }
    .entry-speaker {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #76b900;
    }
    .entry.interviewer .entry-speaker { color: #76b900; }
    .entry.ai-response .entry-speaker { color: #76b900; }
    .entry-text { font-size: 18px; line-height: 1.7; color: #f0f0f0; word-break: break-word; font-weight: 500; }

    #interim-line {
      padding: 6px 10px;
      border-radius: 6px;
      background: rgba(36, 36, 48, 0.6);
      border: 1px dashed rgba(255,255,255,0.06);
      font-size: 12px;
      line-height: 1.6;
      color: #606068;
      font-style: italic;
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }
    #interim-line .entry-time { font-size: 10px; font-family: 'JetBrains Mono', monospace; min-width: 36px; color: #606068; }
    #interim-text { flex: 1; }

    .transcript-actions {
      display: flex;
      gap: 6px;
      margin-top: 8px;
      flex-shrink: 0;
    }
    .transcript-actions .btn-ctrl { flex: 1; text-align: center; }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: -50px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(36, 36, 48, 0.95);
      color: #f0f0f0;
      padding: 10px 16px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 12px;
      z-index: 99999;
      transition: bottom 0.25s;
      white-space: nowrap;
    }
    #toast.show { bottom: 20px; }

    /* ── Panel note ── */
    .panel-note {
      font-size: 10px;
      color: #606068;
      text-align: center;
      margin-top: auto;
      padding-top: 12px;
    }
  </style>
</head>
<body>
  <div class="floating-container" id="floatingContainer">
    <div class="titlebar" id="titlebar">
      <div class="status-indicator" id="statusIndicator"></div>
      <div class="titlebar-title">Interview Copilot</div>
      <div class="controls">
        <button class="btn-ctrl" id="btnClearResponse" title="Clear">✕</button>
      </div>
    </div>

    <div class="transcript-bar" id="transcriptBar">
      <span id="transcriptText">Ready. Ctrl+M to paste+AI, Alt+R to record. Ctrl+Q/J/K/Y for panels.</span>
    </div>
    <div id="mute-badge" style="display:none;color:#ef4444;font-weight:700;font-size:11px;text-align:center;padding:2px 0;background:rgba(239,68,68,0.15);flex-shrink:0;">🎤 MUTED (Alt+Z)</div>



    
    <div class="live-transcript" id="liveTranscript">
      <div id="liveEntries"></div>
      <div class="live-interim" id="liveInterim"></div>
    </div>

    <div class="resize-handle" id="resizeHandle"></div>

    <!-- ── Panel: Model Selector (Ctrl+Q) ── -->
    <div class="panel-overlay" id="panelModel">
      <div class="panel-header">
        AI Model <span class="panel-hint">Ctrl+Q</span>
        <button class="panel-close" onclick="closePanel()">✕</button>
      </div>
      <div class="model-grid" id="modelGrid"></div>
      <div class="api-section">
        <div class="api-label">API Key</div>
        <div class="api-input-wrap">
          <input class="api-input" type="password" id="apiKeyInput" placeholder="Enter API key for selected model" oninput="onApiKeyChange()">
          <button class="api-eye" onclick="toggleApiVis()">👁</button>
        </div>
        <div id="apiStatus"></div>
      </div>
      <div class="panel-note">Esc to close</div>
    </div>

    <!-- ── Panel: Code Chatbox (Ctrl+J) ── -->
    <div class="panel-overlay" id="panelCode">
      <div class="panel-header">
        Code Assistant <span class="panel-hint">Ctrl+J</span>
        <button class="panel-close" onclick="closePanel()">✕</button>
      </div>
      <textarea class="code-textarea" id="codeInput" placeholder="Paste code or ask a question..."></textarea>
      <div class="code-actions">
        <button class="code-btn" onclick="pasteFromClipboard()">📋 Paste</button>
        <button class="code-btn primary" onclick="submitCode()">Send</button>
        <button class="code-btn" onclick="clearCode()">Clear</button>
      </div>
      <div class="panel-note">Esc to close</div>
    </div>

    <!-- ── Panel: Waveform + Recording (Ctrl+Y) ── -->
    <div class="panel-overlay" id="panelWave">
      <div class="panel-header">
        Voice Recording <span class="panel-hint">Ctrl+Y</span>
        <button class="panel-close" onclick="closePanel(); return false;">✕</button>
      </div>
      <div class="waveform" id="waveform">
        <div class="waveform-bar" id="wb1"></div>
        <div class="waveform-bar" id="wb2"></div>
        <div class="waveform-bar" id="wb3"></div>
        <div class="waveform-bar" id="wb4"></div>
        <div class="waveform-bar" id="wb5"></div>
        <div class="waveform-bar" id="wb6"></div>
        <div class="waveform-bar" id="wb7"></div>
        <div class="waveform-bar" id="wb8"></div>
        <div class="waveform-bar" id="wb9"></div>
        <div class="waveform-bar" id="wb10"></div>
        <div class="waveform-bar" id="wb11"></div>
        <div class="waveform-bar" id="wb12"></div>
      </div>
      <div class="waveform-label" id="waveformLabel">Not active</div>
      <div class="record-btns">
        <button class="btn-rec record" id="btnStart" onclick="startListening()">🎤 Record</button>
        <button class="btn-rec stop" id="btnStop" onclick="stopListening()" disabled>⏹ Stop</button>
      </div>
      <div class="panel-note">Esc to close</div>
    </div>

    <!-- ── Panel: Context (Ctrl+K) ── -->
    <div class="panel-overlay" id="panelContext">
      <div class="panel-header">
        Context <span class="panel-hint">Ctrl+K</span>
        <button class="panel-close" onclick="closePanel()">✕</button>
      </div>
      <select class="ctx-select" id="ctxSelect" onchange="switchContext()"></select>
      <textarea class="ctx-textarea" id="ctxText" placeholder="Paste interview context, background info, or notes..."></textarea>
      <label class="ctx-label">
        <input type="checkbox" id="ctxToggle" onchange="onCtxToggle()">
        Include context with query
      </label>
      <div class="ctx-actions">
        <button class="ctx-btn primary" onclick="saveContext()">Save</button>
        <button class="ctx-btn" onclick="newContext()">+ New</button>
        <button class="ctx-btn danger" onclick="deleteContext()">🗑 Delete</button>
      </div>
      <div class="panel-note">Esc to close</div>
    </div>

    <!-- ── Panel: Full Transcript ── -->
    <div class="panel-overlay" id="panelTranscript">
      <div class="panel-header">
        Transcript
        <button class="panel-close" onclick="closePanel()">✕</button>
      </div>
      <div id="entries" style="display:none;"></div>
      <div id="interim-line" style="display:none">
        <div class="entry-time" id="interim-time"></div>
        <div id="interim-text"></div>
      </div>
      <div id="transcriptEmpty" style="color:#606068;font-size:12px;text-align:center;padding:20px">No entries yet.</div>
      <div class="transcript-actions">
        <button class="btn-ctrl" onclick="clearTranscript()">Clear</button>
        <button class="btn-ctrl primary" onclick="downloadTranscript()">Download</button>
      </div>
      <div class="panel-note">Esc to close</div>
    </div>
  </div>

  <div id="toast"></div>

  <script>
    // ─────────────────────────────────────────────────────────────────────
    // STATE
    // ─────────────────────────────────────────────────────────────────────
    let apiKeys = {
      nvidia: localStorage.getItem('api_nvidia') || '',
      groq: localStorage.getItem('api_groq') || '',
      mistral: localStorage.getItem('api_mistral') || '',
      openrouter: localStorage.getItem('api_openrouter') || '',
    };

    const MODELS = {
      nvidia: { name: 'NVIDIA NIM', endpoint: 'https://integrate.api.nvidia.com/v1/chat/completions', modelId: 'meta/llama-2-70b-chat' },
      groq: { name: 'Groq', endpoint: 'https://api.groq.com/openai/v1/chat/completions', modelId: 'mixtral-8x7b-32768' },
      mistral: { name: 'Mistral', endpoint: 'https://api.mistral.ai/v1/chat/completions', modelId: 'mistral-small-latest' },
      openrouter: { name: 'OpenRouter', endpoint: 'https://openrouter.ai/api/v1/chat/completions', modelId: 'openai/gpt-4o-mini' }
    };

    let currentModel = localStorage.getItem('copilot_model') || 'nvidia';
    let activePanel = null;

    // Context state
    let contextEntries = JSON.parse(localStorage.getItem('ctx_entries') || '[]');
    let activeCtxId = localStorage.getItem('ctx_active') || null;
    let includeCtx = localStorage.getItem('ctx_include') === 'true';

    // Speech state — WebSocket phone relay (Electron = receiver)
    let relaySocket = null;
    let relayPingInterval = null;
    let relayConfig = { url: '', secret: '' };
    // relayPaused mirrors the main-process isMicMuted gate.
    // When true the relay onmessage handler drops every incoming transcript
    // before it can touch the UI or trigger AI — same as the main-process gate
    // but enforced in the renderer too so nothing slips through.
    let relayPaused = false;
    let isListening = false;
    let transcriptEntries = [];
    let editingEntryEl = null;

    document.addEventListener('click', function (e) {
      if (!editingEntryEl) return;
      const entriesEl = document.getElementById('entries');
      const liveEl = document.getElementById('liveEntries');
      const insideEntries = entriesEl && entriesEl.contains(e.target);
      const insideLive = liveEl && liveEl.contains(e.target);
      if (!insideEntries && !insideLive) {
        editingEntryEl.contentEditable = 'false';
        editingEntryEl = null;
      }
    });

    // ── Relay sentence buffer + question-mark–gated AI delay ─────────────
    // Sentences arriving from the relay are accumulated here until one ends
    // with '?'. At that point we arm a 2-second timer; if no new '?' sentence
    // resets it before it fires, the whole buffer is sent to the AI.
    // Non-'?' sentences just display in the transcript and extend the buffer
    // without ever starting the timer — so the relay stays hot and listening.
    let relayBuffer        = '';   // accumulated sentence text awaiting a '?'
    let relayAITimer       = null; // setTimeout handle for the 2s hold-off

    // ── AI-running gate ───────────────────────────────────────────────────
    // Set to true the moment triggerAI/queryAI starts, cleared when the
    // response lands (or errors). While true:
    //   • candidate filler words from the relay are dropped silently
    //     (interviewer speech still passes through so the next question queues)
    //   • the local SpeechRecognition onresult skips interim display updates
    //     so the interim bar doesn't flicker with filler mid-response
    //   • a second triggerAI call cannot be stacked on top of the running one
    let aiRunning = false;

    // ── AI echo / self-read detection ─────────────────────────────────────
    // Stores the last AI response so we can detect when the mic picks up
    // the user reading it back. If incoming text is a substring of (or very
    // similar to) the last AI response we treat it as self-echo and suppress it.
    let lastAIResponse = '';
    let selfReadSuppressUntil = 0; // epoch ms — suppress relay until this time

    // ── Filler phrases (keyword-matched, zero-latency stall talk) ─────────
    const FILLER_PHRASES = [
      {
        keywords: ['experience','background','role','job','company','last role','career','position','responsibility','history','yourself','tell me about'],
        texts: [
          "That brings back a specific project from my time in my last role, where we...",
          "When looking back at my overall background, this is something I've spent a lot of time on, particularly because...",
          "Throughout my career, I've had several opportunities to focus on this, and what stands out most is...",
          "In my previous position, this was actually a core part of my day-to-day responsibilities, especially when...",
          "That's been a central theme in my professional history, and the way I usually outline it is...",
          "Reflecting on my time with my former company, a really relevant example that springs to mind is...",
          "I've had direct ownership over that area in past roles, and the main lesson I took from it was...",
        ],
      },
      {
        keywords: ['handle','approach','situation','scenario','tackle','deal with','manage','execute','navigate','respond'],
        texts: [
          "The way I typically approach that kind of scenario stems from my work on previous projects, where...",
          "Whenever I've had to deal with a dynamic like that, my first priority has always been to...",
          "I've navigated similar situations in the past, and the strategy that yielded the best result was...",
          "My initial reaction when managing that type of task is to immediately step back and look at...",
          "The framework I rely on when tackling that specific issue usually starts with...",
          "In terms of execution, I've found that responding effectively to that comes down to...",
          "I recall a specific scenario where I had to handle something nearly identical, and the way it played out was...",
        ],
      },
      {
        keywords: ['challenge','difficult','problem','issue','obstacle','conflict','mistake','failure','blocker','setback'],
        texts: [
          "I've encountered a situation exactly like that before, and the first thing I had to figure out was...",
          "When faced with that kind of obstacle, my primary focus is to break the problem down by...",
          "That was definitely a major learning curve for me earlier on, and the way I resolved the issue was...",
          "Handling difficult roadblocks like that usually requires balancing immediate triage with long-term fixes, starting with...",
          "I actually dealt with a similar setback during a high-stakes initiative, where the core issue was...",
          "Whenever a conflict or blocker like that arises, I make it a point to address it directly by...",
          "That type of challenge comes up periodically, and my proven approach for turning it around involves...",
        ],
      },
      {
        keywords: ['strategy','process','method','framework','plan','system','workflow','structure','prioritize','decision'],
        texts: [
          "Over the course of my career, my strategy for handling this has evolved, but the core foundation usually starts with...",
          "I actually built out a standardized workflow for this in a previous role, which focused primarily on...",
          "My decision-making process in those circumstances is pretty structured, beginning with...",
          "The method I find most effective for prioritizing tasks in that environment revolves around...",
          "When designing a plan to address that, I always make sure the system accounts for...",
          "The general framework I apply here has three distinct phases, starting with...",
          "Establishing a reliable process for that was a major goal of mine recently, and it centered on...",
        ],
      },
      {
        keywords: [],
        texts: [
          "That's a crucial area to dive into, and looking at how I've approached it in practice...",
          "I've spent a lot of time thinking about and working through that exact topic, particularly around...",
          "There are a few key dimensions to how I look at that, but the most significant aspect is...",
          "That aligns really closely with how I operate day-to-day, especially when considering...",
          "To give you a complete picture on that, it's best to break it down into...",
          "I have a couple of different insights on that based on past experience, starting with...",
          "That's an excellent point to highlight, and the way I usually frame my perspective on it is...",
        ],
      },
    ];

    function matchFiller(text) {
      if (!text) return FILLER_PHRASES[FILLER_PHRASES.length - 1].texts[Math.floor(Math.random() * FILLER_PHRASES[FILLER_PHRASES.length - 1].texts.length)];
      const lower = text.toLowerCase();
      let best = { category: null, score: 0 };
      for (const f of FILLER_PHRASES) {
        if (f.keywords.length === 0) continue;
        let score = 0;
        for (const kw of f.keywords) {
          if (lower.includes(kw)) score++;
        }
        if (score > best.score) best = { category: f, score };
      }
      const target = best.category || FILLER_PHRASES[FILLER_PHRASES.length - 1];
      return target.texts[Math.floor(Math.random() * target.texts.length)];
    }

    function normalise(s) {
      return s.toLowerCase().replace(/[^a-z0-9 ]/g, '').replace(/\s+/g, ' ').trim();
    }

    // Returns true when `incoming` looks like the user reading the AI script.
    // Checks: (a) incoming is a leading/trailing chunk of the last AI response,
    //         (b) incoming is very short (filler) right after a confirmed read,
    //         (c) relay keeps sending continuous segments (still reading).
    function isSelfRead(text) {
      if (!lastAIResponse) return false;
      const normIncoming = normalise(text);
      const normAI = normalise(lastAIResponse);
      if (normIncoming.length < 6) return false;

      // Direct containment — the incoming chunk appears inside the AI text
      if (normAI.includes(normIncoming)) return true;

      // Leading overlap — first N words of incoming match somewhere in AI text
      const words = normIncoming.split(' ');
      if (words.length >= 4) {
        const probe = words.slice(0, 5).join(' ');
        if (normAI.includes(probe)) return true;
      }

      // Still inside suppress window (continuous relay segments = still reading)
      if (Date.now() < selfReadSuppressUntil) return true;

      return false;
    }

    function markAIResponseSpoken(responseText) {
      lastAIResponse = responseText;
      // Suppress for however long a ~200wpm reading would take + 3s buffer
      const wordCount = responseText.trim().split(/\s+/).length;
      const readMs = (wordCount / 200) * 60000 + 3000;
      selfReadSuppressUntil = Date.now() + readMs;
    }

    // ── Early classification (phase-1 latency optimisation) ───────────────
    // The relay now sends the first word of each utterance as phase:1 before
    // the full sentence arrives. We pre-build the filtered systemMsg during
    // that gap so triggerAI() can fire with zero extra work on isFinal.
    const INTENT_MAP = {
      what:'DEFINITION', who:'PERSON', when:'TIME', where:'LOCATION',
      why:'REASON', how:'PROCESS', which:'CHOICE', tell:'NARRATIVE',
      describe:'NARRATIVE', explain:'NARRATIVE', walk:'NARRATIVE',
      give:'NARRATIVE', sell:'PITCH', can:'YESNO', could:'YESNO',
      is:'YESNO', do:'YESNO', will:'YESNO', would:'YESNO',
    };

    let earlyClassification  = null; // { intent, systemMsg, classifiedAt }
    let lastClassifiedText   = '';   // track what we last classified to avoid redundant work
    let lastClassifiedWords  = 0;    // word count at last classifyEarly call

    function classifyEarly(text) {
      const trimmed = text.trim();
      if (!trimmed) return;

      const words = trimmed.split(/\s+/);
      const wc    = words.length;

      // Only re-classify when meaningful new words have arrived
      if (trimmed === lastClassifiedText) return;
      if (earlyClassification && wc > 5 && wc - lastClassifiedWords < 3) return;

      lastClassifiedText  = trimmed;
      lastClassifiedWords = wc;

      const firstWord = words[0].toLowerCase().replace(/[^a-z]/g, '');
      const intent    = INTENT_MAP[firstWord] || 'GENERAL';

      const baseSystem = "Answer the interview question as the person described in the context above. Speak in first person, naturally and professionally — like a real person talking, not a resume being read. Use plain language that anyone can follow, avoid jargon unless necessary, and keep it concise. For concept questions, 2-3 sentences is enough. For process or troubleshooting questions, use a short numbered list with no filler. No hype openers, no sign-offs.";
      const prebuiltSystemMsg = buildSystemMsg(baseSystem, trimmed);

      earlyClassification = { intent, systemMsg: prebuiltSystemMsg, classifiedAt: Date.now() };
    }

    function resetEarlyClassification() {
      earlyClassification = null;
      lastClassifiedText  = '';
      lastClassifiedWords = 0;
    }

    function isInterviewPrompt(text) {
      const t = text.trim();
      const openers = /\b(let's|lets|break down|take me|take us|run me|run us|i'd like|i would like|tell|describe|walk|give|explain|sell|detail|outline|share|discuss|illustrate|analyze|narrate|recall|define|evaluate|clarify|summarize|identify|justify|talk|imagine|suppose|consider|elaborate|provide|demonstrate|list|compare|contrast|state|highlight|mention|pitch|assume|run|help me|can you|could you|what|why|how|when|where|who)\b/i;
      if (openers.test(t)) return true;
      if (t.endsWith('?')) return true;
      if (t.length < 8) return false;
      if (/^(i see|that makes sense|got it|sounds good|fair enough|understood|ok|right|makes sense|cool)\b/i.test(t)) return false;
      return false;
    }

    // ─────────────────────────────────────────────────────────────────────
    // CONTENT PROTECTION
    // ─────────────────────────────────────────────────────────────────────
    function setContentProtection(enable) {
      if (window.electronAPI?.setContentProtection) {
        window.electronAPI.setContentProtection(enable);
      }
    }
    window.addEventListener('load', () => setContentProtection(true));

    // ─────────────────────────────────────────────────────────────────────
    // WINDOW RESIZE
    // ─────────────────────────────────────────────────────────────────────
    let isResizing = false;
    let rStartX, rStartY, rStartW, rStartH;

    document.getElementById('resizeHandle').addEventListener('mousedown', (e) => {
      e.preventDefault();
      e.stopPropagation();
      isResizing = true;
      rStartX = e.clientX;
      rStartY = e.clientY;
      rStartW = window.innerWidth;
      rStartH = window.innerHeight;
      window.addEventListener('mousemove', onResize);
      window.addEventListener('mouseup', stopResize);
      window.addEventListener('mouseleave', stopResize);
    });

    function onResize(e) {
      if (!isResizing) return;
      const w = Math.max(400, rStartW + (e.clientX - rStartX));
      const h = Math.max(300, rStartH + (e.clientY - rStartY));
      if (window.electronAPI?.resizeWindow) {
        window.electronAPI.resizeWindow(w, h);
      }
    }

    function stopResize() {
      isResizing = false;
      window.removeEventListener('mousemove', onResize);
      window.removeEventListener('mouseup', stopResize);
      window.removeEventListener('mouseleave', stopResize);
    }

    // ─────────────────────────────────────────────────────────────────────
    // UTILITIES
    // ─────────────────────────────────────────────────────────────────────
    function isEditableElement(el) {
      return el.tagName === 'INPUT' || el.tagName === 'TEXTAREA' || el.contentEditable === 'true';
    }

    function getNow() {
      const d = new Date();
      return d.getHours().toString().padStart(2,'0') + ':' + d.getMinutes().toString().padStart(2,'0');
    }

    function isQuestion(text) {
      return isInterviewPrompt(text);
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function showToast(msg) {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(() => t.classList.remove('show'), 2800);
    }

    // ─────────────────────────────────────────────────────────────────────
    // UI UPDATES
    // ─────────────────────────────────────────────────────────────────────
    function setStatus(state) {
      const indicator = document.getElementById('statusIndicator');
      indicator.className = 'status-indicator ' + state;
    }

    function addTranscriptLine(speaker, text) {
      const bar = document.getElementById('transcriptText');
      bar.innerHTML = `<strong>${escHtml(speaker)}:</strong> ${escHtml(text)}`;
      bar.parentElement.scrollTop = bar.parentElement.scrollHeight;
    }

    function displayResponse(speaker, text) {
      setStatus('ready');
    }

    function showFiller(text) {
      addTranscriptEntry({ speaker: 'AI', text, type: 'ai-response' });
    }

    // ─────────────────────────────────────────────────────────────────────
    // PANEL MANAGEMENT (Ctrl+Q / J / K / Y, Esc to close)
    // ─────────────────────────────────────────────────────────────────────
    function openPanel(name) {
      closePanel();
      const el = document.getElementById('panel' + name.charAt(0).toUpperCase() + name.slice(1));
      if (!el) return;
      el.classList.add('open');
      activePanel = name;
    }

    function closePanel() {
      if (activePanel) {
        const el = document.getElementById('panel' + activePanel.charAt(0).toUpperCase() + activePanel.slice(1));
        if (el) el.classList.remove('open');
        activePanel = null;
      }
    }

    function togglePanel(name) {
      if (activePanel === name) { closePanel(); }
      else { openPanel(name); }
    }

    // ─────────────────────────────────────────────────────────────────────
    // MODEL GRID & API KEY
    // ─────────────────────────────────────────────────────────────────────
    function renderModelGrid() {
      const grid = document.getElementById('modelGrid');
      if (!grid) return;
      grid.innerHTML = '';
      Object.entries(MODELS).forEach(([key, model]) => {
        const opt = document.createElement('div');
        opt.className = 'model-option';
        opt.innerHTML = `
          <input type="radio" name="panelModel" id="pm-${key}" value="${key}"
            onchange="selectModel('${key}')"
            ${currentModel === key ? 'checked' : ''}>
          <label for="pm-${key}">
            <div class="model-name">${model.name}</div>
            <div class="model-desc">${model.modelId}</div>
          </label>
          ${currentModel === key ? '<span class="check">✓</span>' : ''}`;
        grid.appendChild(opt);
      });
    }

    function selectModel(key) {
      currentModel = key;
      localStorage.setItem('copilot_model', currentModel);
      const input = document.getElementById('apiKeyInput');
      if (input) input.value = apiKeys[currentModel] || '';
      updateApiStatus();
      renderModelGrid();
      showToast('Switched to ' + MODELS[key].name);
    }

    function onApiKeyChange() {
      const input = document.getElementById('apiKeyInput');
      if (!input) return;
      apiKeys[currentModel] = input.value.trim();
      localStorage.setItem('api_' + currentModel, apiKeys[currentModel]);
      updateApiStatus();
    }

    function updateApiStatus() {
      const el = document.getElementById('apiStatus');
      if (!el) return;
      const v = apiKeys[currentModel] || '';
      if (v.length > 10) {
        el.innerHTML = `✓ <span style="color:#10b981">API key configured</span>`;
      } else {
        el.innerHTML = `ⓘ <span style="color:#606068">Enter API key</span>`;
      }
    }

    function toggleApiVis() {
      const input = document.getElementById('apiKeyInput');
      if (!input) return;
      input.type = input.type === 'password' ? 'text' : 'password';
    }

    // ─────────────────────────────────────────────────────────────────────
    // SPEECH RECOGNITION — Local audio capture (mic + system loopback)
    // ─────────────────────────────────────────────────────────────────────
    let recognition = null;
    let micStream = null;
    let loopStream = null;
    let audioCtx = null;
    let mixedDest = null;
    let recognitionMuted = false;
    let isMuted = false;
    let shortMergeBuffer = '';

    function sendTranscript(text, isFinal) {
      if (relaySocket?.readyState === WebSocket.OPEN)
        relaySocket.send(JSON.stringify({ type: 'transcript', text, isFinal }));
    }

    function connectRelay() {
      if (!relayConfig.url) {
        console.warn('[Relay] No URL configured yet — skipping connect (will retry after config loads)');
        return;
      }
      if (relaySocket?.readyState === WebSocket.OPEN) return;
      const wsUrl = `${relayConfig.url}?role=electron&secret=${relayConfig.secret}`;
      console.log('[Relay] Connecting to:', wsUrl.replace(relayConfig.secret, '***'));
      relaySocket = new WebSocket(wsUrl);

      relaySocket.onopen = () => {
        console.log('[Relay] Connected as electron — readyState:', relaySocket.readyState);
        showToast('📡 Relay connected');
        relayPingInterval = setInterval(() => {
          if (relaySocket?.readyState === WebSocket.OPEN)
            relaySocket.send(JSON.stringify({ type: 'ping' }));
        }, 20000);
      };

      relaySocket.onmessage = (e) => {
        let msg;
        try { msg = JSON.parse(e.data); } catch { return; }

        // ── DEBUG: log every raw message so we can see the relay shape ──────
        console.log('[Relay:raw]', JSON.stringify(msg).substring(0, 200));

        if (msg.type === 'status') {
          showToast(msg.phone_connected ? '📱 Phone connected.' : '📱 Phone disconnected.');
        }

        if (msg.type === 'transcript') {
          // ── DEBUG: log what we received before any gate ──────────────────
          console.log('[Relay:transcript] raw text=«' + msg.text + '» speaker=' + msg.speaker + ' isFinal=' + msg.isFinal + ' phase=' + msg.phase);

          if (!msg.text?.trim()) {
            console.log('[Relay:drop] empty text');
            return;
          }

          // ── Gate 1: mute / pause ────────────────────────────────────────
          if (isMuted || relayPaused) {
            console.log('[Relay:drop] Gate1 muted — isMuted=' + isMuted + ' relayPaused=' + relayPaused);
            return;
          }

           let text    = msg.text.trim();
           const speaker = msg.speaker || 'interviewer'; // 'you' | 'interviewer'
           const phase   = msg.phase   || 'interim';     // 1 | 2 | 'interim' | 'final'
          // Treat as final if: isFinal flag is true, OR phase is 'final', OR
          // the relay didn't send either field (older relay versions send no phase/isFinal)
          const isFinal = msg.isFinal === true || phase === 'final' ||
                          (msg.isFinal === undefined && msg.phase === undefined);

          console.log('[Relay:parsed] text=«' + text.substring(0,60) + '» speaker=' + speaker + ' phase=' + phase + ' isFinal=' + isFinal);

          // ── Gate 2: drop own voice from electron side only ─────────────
          // The relay sets from:'phone' for the interviewer's phone mic and
          // from:'electron' (or omits it) for the candidate's local mic.
          // speaker:'you' on from:'phone' is the INTERVIEWER — pass it through.
          // speaker:'you' on from:'electron' is the CANDIDATE — drop it.
          const from = msg.from || 'electron';
          if (speaker === 'you' && from !== 'phone') {
            console.log('[Relay:drop] Gate2 candidate mic (speaker=you from=' + from + ')');
            if (isSelfRead(text)) {
              selfReadSuppressUntil = Math.max(selfReadSuppressUntil, Date.now() + 3000);
            }
            return;
          }

          // ── Gate 3: self-read suppression (secondary, for edge cases) ──
          if (isSelfRead(text)) {
            if (!isFinal) selfReadSuppressUntil = Math.max(selfReadSuppressUntil, Date.now() + 3000);
            console.log('[Relay:drop] Gate3 self-read suppressed:', text.substring(0, 60));
            return;
          }

          // ── Gate 4: AI-running filler suppression ──────────────────────
          // While an AI call is in flight the candidate fills dead air with
          // filler words ("um", "yeah", "so", etc.). Drop ALL candidate-side
          // relay messages during that window so they can't:
          //   (a) stack a second triggerAI on top of the running one, or
          //   (b) overwrite the interim bar while the response is streaming.
          // Interviewer speech (from:'phone') still passes through so the
          // next question gets queued and displayed as normal.
          if (aiRunning && from !== 'phone') {
            console.log('[Relay:drop] Gate4 AI running — dropping candidate filler:', text.substring(0, 60));
            return;
          }

          // ── Phase 1: first word arrived — start classifying immediately ─
          if (phase === 1) {
            console.log('[Relay:phase1] classifyEarly:', text);
            classifyEarly(text);
            return;
          }

          // ── Phase 2 / interim: more words — show in interim bar but don't commit ─
          if (!isFinal) {
            console.log('[Relay:interim] showing in interim bar:', text.substring(0, 60));
            classifyEarly(text);
            document.getElementById('liveInterim').textContent = text;
            return;
          }

          // ── Short-phrase merge: buffer <4 word utterances, prepend when enough arrives ──
          const wc = text.split(/\s+/).length;
          if (wc < 4 && !text.endsWith('?')) {
            shortMergeBuffer = shortMergeBuffer ? shortMergeBuffer + ' ' + text : text;
            console.log('[Relay:merge] Buffered short (' + wc + 'w): «' + shortMergeBuffer + '»');
            return;
          }
          if (shortMergeBuffer) {
            text = shortMergeBuffer + ' ' + text;
            shortMergeBuffer = '';
            console.log('[Relay:merge] Prepended: «' + text.substring(0, 80) + '»');
          }

          // ── Final: full sentence — only show prompts/questions and only answer questions ──
          const endsWithQuestion = /[?]$/.test(text.trim());
          const isPrompt = isInterviewPrompt(text);
          console.log('[Relay:final] endsWithQuestion=' + endsWithQuestion + ' isPrompt=' + isPrompt + ' text=«' + text + '»');

          document.getElementById('liveInterim').textContent = '';
          resetEarlyClassification();

          if (isPrompt) {
            addTranscriptEntry({ speaker: 'Interviewer', text, type: 'interviewer' });
            addTranscriptLine('Interviewer', text.substring(0, 80) + (text.length > 80 ? '...' : ''));
            updateLiveTranscript();
            closePanel();

            // Append this sentence to the running buffer (space-separated)
            relayBuffer = relayBuffer ? relayBuffer + ' ' + text : text;

            // Show filler immediately — zero-latency stall talk while AI thinks
            showFiller(matchFiller(text));

            // Cancel any pending timer — we'll start a fresh 2s window
            if (relayAITimer) { clearTimeout(relayAITimer); relayAITimer = null; }

            const frozenText   = relayBuffer;
            const frozenSysMsg = earlyClassification?.systemMsg || null;

            console.log('[Relay:buffer] ' + (endsWithQuestion ? 'Question mark detected' : 'Prompt detected (no ?)') + ' — waiting 2s before AI. Buffer=«' + frozenText.substring(0, 80) + '»');

            relayAITimer = setTimeout(() => {
              relayAITimer = null;
              relayBuffer  = '';
              console.log('[Relay:buffer] 2s elapsed — sending to AI: «' + frozenText.substring(0, 80) + '»');
              triggerAI(frozenText, frozenSysMsg);
            }, 2000);
          }
        }
      };

      relaySocket.onclose = (ev) => {
        console.warn('[Relay] Disconnected — code:', ev.code, 'reason:', ev.reason || '(none)', '— retrying in 5s');
        clearInterval(relayPingInterval);
        if (relayAITimer) { clearTimeout(relayAITimer); relayAITimer = null; }
        relayBuffer = '';
        shortMergeBuffer = '';
        relaySocket = null;
        setTimeout(connectRelay, 5000);
      };

      relaySocket.onerror = (err) => {
        console.error('[Relay] WebSocket error (check URL/secret in .env and that relay server is running):', err.type || err);
      };
    }

    async function startListening() {
      if (window.electronAPI?.startPhoneMic) {
        window.electronAPI.startPhoneMic().catch(err => {
          console.warn('[startListening] startPhoneMic error:', err);
        });
      }
      connectRelay();
      try {
        micStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        try {
          loopStream = await navigator.mediaDevices.getDisplayMedia({ audio: true, video: { width: 1, height: 1, frameRate: 1 } });
          loopStream.getVideoTracks().forEach(t => t.stop());
        } catch (loopErr) {
          console.log('[Audio] Loopback unavailable, mic only:', loopErr.message);
          loopStream = null;
        }
        audioCtx = new AudioContext();
        mixedDest = audioCtx.createMediaStreamDestination();
        audioCtx.createMediaStreamSource(micStream).connect(mixedDest);
        if (loopStream) audioCtx.createMediaStreamSource(loopStream).connect(mixedDest);
      } catch (err) {
        showToast('Microphone access denied.');
        return;
      }

      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) { showToast('Speech recognition not supported.'); return; }
      recognition = new SR();
      recognition.continuous = true;
      recognition.interimResults = true;
      recognition.maxAlternatives = 1;

      recognition.onstart = () => {
        isListening = true;
        setStatus('listening');
        document.getElementById('btnStart').disabled = true;
        document.getElementById('btnStop').disabled = false;
        setWaveActive(true);
        document.getElementById('liveTranscript').classList.add('active');
        document.getElementById('interim-line').style.display = 'flex';
      };

      recognition.onresult = (e) => {
        // When the relay WebSocket is connected it is the sole transcript source.
        // Local SpeechRecognition hears the same audio and would produce duplicate
        // entries, so we skip addTranscriptEntry/triggerAI when relay is active.
        // Interim text is still collected so the waveform/bar stays animated.
        const relayActive = relaySocket?.readyState === WebSocket.OPEN;

        let interim = '';
        for (let i = e.resultIndex; i < e.results.length; i++) {
          const t = e.results[i][0].transcript;
          if (e.results[i].isFinal) {
            if (!recognitionMuted && !isMuted && !relayActive) {
              // Relay not connected — local recognition is the only source, use it
              let trimmed = t.trim();
              // Merge short phrases (<4 words) into buffer, prepend when enough arrives
              const lwc = trimmed.split(/\s+/).length;
              if (lwc < 4 && !trimmed.endsWith('?')) {
                shortMergeBuffer = shortMergeBuffer ? shortMergeBuffer + ' ' + trimmed : trimmed;
                continue;
              }
              if (shortMergeBuffer) {
                trimmed = shortMergeBuffer + ' ' + trimmed;
                shortMergeBuffer = '';
              }
              if (isInterviewPrompt(trimmed)) {
                addTranscriptEntry({ speaker: 'Interviewer', text: trimmed, type: 'interviewer' });
                addTranscriptLine('You', trimmed.substring(0, 80) + (trimmed.length > 80 ? '...' : ''));
                updateLiveTranscript();
                closePanel();
                if (isQuestion(trimmed)) {
                  showFiller(matchFiller(trimmed));
                  triggerAI(trimmed);
                }
              }
              sendTranscript(trimmed, true);
            }
            // Relay active: relay onmessage handles transcript/AI — skip here
          } else {
            if (!recognitionMuted && !isMuted && !relayActive) {
              interim += t;
              sendTranscript(t, false);
            } else if (!recognitionMuted && !isMuted) {
              interim += t; // relay active: collect for waveform display only
            }
          }
        }
        // While AI is running, don't let candidate filler words overwrite the
        // interim bar — it would look like the app is confused / double-listening.
        if (!recognitionMuted && !isMuted && !aiRunning) {
          document.getElementById('liveInterim').textContent = interim;
          document.getElementById('interim-text').textContent = interim;
          document.getElementById('interim-time').textContent = interim ? getNow() : '';
        }
      };

      recognition.onerror = (e) => {
        if (e.error === 'not-allowed') {
          setStatus('error');
          showToast('Microphone access denied.');
        } else if (e.error !== 'no-speech') {
          setStatus('error');
        }
      };

      recognition.onend = () => {
        if (isListening && !recognitionMuted) {
          try { recognition.start(); } catch {}
        } else {
          setStatus('ready');
          document.getElementById('btnStart').disabled = false;
          document.getElementById('btnStop').disabled = true;
          document.getElementById('liveInterim').textContent = '';
          document.getElementById('interim-line').style.display = 'none';
          setWaveActive(false);
        }
      };

      recognition.start();
    }

    function stopListening() {
      isListening = false;
      if (window.electronAPI?.stopPhoneMic) window.electronAPI.stopPhoneMic();
      if (window.electronAPI?.killOrphanRelay) window.electronAPI.killOrphanRelay();
      if (recognition) { try { recognition.stop(); } catch {} recognition = null; }
      if (micStream) { micStream.getTracks().forEach(t => t.stop()); micStream = null; }
      if (loopStream) { loopStream.getTracks().forEach(t => t.stop()); loopStream = null; }
      if (audioCtx) { audioCtx.close(); audioCtx = null; mixedDest = null; }
      clearInterval(relayPingInterval);
      if (relayAITimer) { clearTimeout(relayAITimer); relayAITimer = null; }
      relayBuffer = '';
      shortMergeBuffer = '';
      if (relaySocket) { relaySocket.close(); relaySocket = null; }
      setStatus('ready');
      document.getElementById('btnStart').disabled = false;
      document.getElementById('btnStop').disabled = true;
      setWaveActive(false);
      document.getElementById('liveInterim').textContent = '';
      document.getElementById('interim-text').textContent = '';
      document.getElementById('interim-time').textContent = '';
      document.getElementById('interim-line').style.display = 'none';

    // ─────────────────────────────────────────────────────────────────────
    // CONTEXT RELEVANCE FILTER
    // Scans WH-words from the question and returns only the lines from the
    // context blob that actually contain those keywords — so the AI only
    // gets the slice it needs instead of the full context every time.
    // Falls back to the full context when nothing relevant is found.
    // This runs AFTER the existing includeCtx / activeCtxId guardrails.
    // ─────────────────────────────────────────────────────────────────────
    function extractRelevantContext(question, ctxText) {
      if (!question || !ctxText) return ctxText;

      // 1. Pull WH-words and their immediate neighbours from the question
      const WH_PATTERN = /\b(what|who|when|where|why|how|which)\b/gi;
      const whMatches = [...question.matchAll(WH_PATTERN)];
      if (whMatches.length === 0) return ctxText; // no WH-words → full context

      // 2. Build a set of search terms:
      //    • the WH-word itself
      //    • up to 2 "content" words that follow each WH-word (skip stop-words)
      const STOP = new Set(['a','an','the','is','are','was','were','be','been','being',
                            'do','does','did','to','of','in','on','at','for','and','or',
                            'i','you','he','she','it','we','they','my','your','his','her',
                            'its','our','their','me','him','us','them','this','that']);

      const questionWords = question.toLowerCase().replace(/[^a-z0-9 ]/g,'').split(/\s+/);
      const searchTerms = new Set();

      whMatches.forEach(m => {
        const wh = m[1].toLowerCase();
        searchTerms.add(wh);
        // find the index of this WH-word in questionWords and grab content words after it
        const idx = questionWords.indexOf(wh, Math.max(0, questionWords.indexOf(wh)));
        let picked = 0;
        for (let i = idx + 1; i < questionWords.length && picked < 2; i++) {
          const w = questionWords[i];
          if (w.length > 2 && !STOP.has(w)) { searchTerms.add(w); picked++; }
        }
      });

      // 3. Score every line of the context: count how many search terms it contains
      const lines = ctxText.split('\n');
      const scored = lines.map(line => {
        const lower = line.toLowerCase();
        let score = 0;
        searchTerms.forEach(term => { if (lower.includes(term)) score++; });
        return { line, score };
      });

      // 4. Keep lines with at least one keyword hit
      const relevant = scored.filter(l => l.score > 0).map(l => l.line);

      // 5. Fallback: if nothing matched, send the full context so the AI is never left empty
      return relevant.length > 0 ? relevant.join('\n') : ctxText;
    }

    function buildSystemMsg(base, question = '') {
      if (!includeCtx) return base;            // existing guardrail — untouched
      const ctxText = getActiveCtxText();      // existing guardrail — untouched
      if (!ctxText) return base;

      // NEW: filter context to only the lines relevant to this question
      const filteredCtx = extractRelevantContext(question, ctxText);

      return filteredCtx + '\n\n' + base;
    }

    // ─────────────────────────────────────────────────────────────────────
    // LIVE TRANSCRIPT
    // ─────────────────────────────────────────────────────────────────────
    function updateLiveTranscript() {
      const c = document.getElementById('liveEntries');
      if (!c) return;
      const recent = transcriptEntries.slice(-5);
      c.innerHTML = recent.map(e =>
        `<div class="live-entry"><span class="t">${e.time || new Date().toLocaleTimeString()}</span><span class="s ${e.type === 'ai-response' ? 'a' : 'i'}">${escHtml(e.speaker)}</span><span class="x"${e.type === 'interviewer' ? ' contenteditable="plaintext-only"' : ''}>${escHtml(e.text)}</span></div>`
      ).join('');
      c.parentElement.scrollTop = c.parentElement.scrollHeight;
    }

    // Handle Enter on editable live transcript interviewer entries
    document.addEventListener('keydown', function (e) {
      if (e.key !== 'Enter') return;
      const target = e.target;
      if (!target.classList.contains('x') || target.contentEditable !== 'plaintext-only') return;
      e.preventDefault();
      target.contentEditable = 'false';
      editingEntryEl = null;
      const corrected = target.textContent.trim();
      if (!corrected) return;

      const liveEntry = target.closest('.live-entry');
      const allEntries = [...document.querySelectorAll('#liveEntries .live-entry')];
      const idx = allEntries.indexOf(liveEntry);
      const liveOffset = transcriptEntries.length - allEntries.length;
      const entryIdx = liveOffset + idx;
      if (entryIdx < 0 || entryIdx >= transcriptEntries.length || transcriptEntries[entryIdx].type !== 'interviewer') return;

      transcriptEntries[entryIdx].text = corrected;
      updateLiveTranscript();

      // Remove last AI response
      for (let i = transcriptEntries.length - 1; i >= 0; i--) {
        if (transcriptEntries[i].type === 'ai-response') {
          transcriptEntries.splice(i, 1);
          break;
        }
      }
      const entriesContainer = document.getElementById('entries');
      const aiEntries = entriesContainer.querySelectorAll('.entry.ai-response');
      if (aiEntries.length > 0) aiEntries[aiEntries.length - 1].remove();

      if (isInterviewPrompt(corrected)) {
        queryAI(corrected);
      }
    });

    // ─────────────────────────────────────────────────────────────────────
    // AI QUERY
    // ─────────────────────────────────────────────────────────────────────
    async function triggerAI(question, prebuiltSystemMsg = null) {
      // Hard gate: if either mute flag is set at call time, never send to AI.
      // This catches any transcript that slipped through before the flag flipped.
      if (isMuted || relayPaused) return;

      // AI-running gate: don't stack a second request on top of the current one.
      // The candidate is filling dead air with filler words — those are already
      // suppressed by Gate 4 in the relay handler, but this is the safety net
      // in case triggerAI is called from the local SpeechRecognition path too.
      if (aiRunning) {
        console.log('[AI] Already running — ignoring stacked triggerAI for:', question.substring(0, 60));
        return;
      }

      aiRunning = true;
      closePanel();
      setStatus('thinking');
      try {
        // Use pre-classified systemMsg if available (built during interim phase)
        // — falls back to building it now if early classification didn't run.
        const systemMsg = prebuiltSystemMsg || buildSystemMsg(
          "Answer the interview question as the person described in the context above. Speak in first person, naturally and professionally — like a real person talking, not a resume being read. Use plain language that anyone can follow, avoid jargon unless necessary, and keep it concise. For concept questions, 2-3 sentences is enough. For process or troubleshooting questions, use a short numbered list with no filler. No hype openers, no sign-offs.",
          question
        );
        const { response, usedModel } = await callAIModelWithFallback(question, systemMsg, currentModel);
        markAIResponseSpoken(response); // arm self-read suppression before display
        displayResponse(MODELS[usedModel].name, response);
        addTranscriptLine('AI', response.substring(0, 80) + (response.length > 80 ? '...' : ''));
        addTranscriptEntry({ speaker: 'AI (' + MODELS[usedModel].name + ')', text: response, type: 'ai-response' });
        updateLiveTranscript();
        setStatus('ready');
      } catch (err) {
        displayResponse('Error', err.message);
        setStatus('ready');
        showToast('AI error: ' + err.message);
      } finally {
        // Always release the gate — even on network error or exception —
        // so the app never gets permanently stuck in aiRunning=true.
        aiRunning = false;
      }
    }

    async function queryAI(userMessage, startModelKey = currentModel, systemMsgOverride = null) {
      setStatus('thinking');
      try {
        const systemMsg = systemMsgOverride || buildSystemMsg("Answer the interview question as the person described in the context above. Speak in first person, naturally and professionally — like a real person talking, not a resume being read. Use plain language that anyone can follow, avoid jargon unless necessary, and keep it concise. For concept questions, 2-3 sentences is enough. For process or troubleshooting questions, use a short numbered list with no filler. No hype openers, no sign-offs.", userMessage);
        const { response, usedModel } = await callAIModelWithFallback(userMessage, systemMsg, startModelKey);
        markAIResponseSpoken(response); // arm self-read suppression before display
        displayResponse(MODELS[usedModel].name, response);
        addTranscriptLine(MODELS[usedModel].name, response.substring(0, 60) + (response.length > 60 ? '...' : ''));
        addTranscriptEntry({ speaker: 'AI (' + MODELS[usedModel].name + ')', text: response, type: 'ai-response' });
        updateLiveTranscript();
        setStatus('ready');
      } catch (err) {
        displayResponse('Error', err.message);
        setStatus('ready');
      }
    }

    async function callAIModel(userMessage, systemMsg, modelKey = currentModel) {
      const model = MODELS[modelKey];
      const apiKey = apiKeys[modelKey];
      if (!apiKey) throw new Error('API key not configured');

      let endpoint = model.endpoint;
      let headers = {};
      let payload = {};

      headers = { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + apiKey };
      payload = {
        model: model.modelId,
        messages: [
          { role: 'system', content: systemMsg },
          { role: 'user', content: userMessage }
        ],
        max_tokens: 500,
        temperature: 0.7
      };

      const res = await fetch(endpoint, {
        method: 'POST', headers, body: JSON.stringify(payload)
      });

      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        throw new Error(err.message || err.error?.message || `HTTP ${res.status}`);
      }

      const data = await res.json();
      return data.choices?.[0]?.message?.content?.trim() || 'No response';
    }

    async function callAIModelWithFallback(userMessage, systemMsg, startModelKey) {
      const trySequence = [startModelKey];
      for (const m of ['mistral', 'groq', 'openrouter', 'nvidia']) {
        if (!trySequence.includes(m)) {
          trySequence.push(m);
        }
      }

      let lastError = null;
      let isFallback = false;
      for (const modelKey of trySequence) {
        const apiKey = apiKeys[modelKey];
        if (!apiKey) {
          lastError = new Error(`API key for ${MODELS[modelKey].name} is not configured`);
          isFallback = true;
          continue;
        }
        try {
          const response = await callAIModel(userMessage, systemMsg, modelKey);
          if (isFallback) {
            showToast(`Fallback: using ${MODELS[modelKey].name}`);
          }
          return { response, usedModel: modelKey };
        } catch (err) {
          console.warn(`Model ${MODELS[modelKey].name} failed:`, err.message);
          lastError = err;
          isFallback = true;
        }
      }
      throw lastError || new Error('All models failed');
    }
